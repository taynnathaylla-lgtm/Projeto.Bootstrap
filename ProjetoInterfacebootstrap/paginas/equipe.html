<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato & Equipe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


  <link rel="stylesheet" href="../style/style5.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black">
  <div class="container">
    <a class="navbar-brand" href="../index.html">CineTop</a>
  </div>
</nav>

<section class="container py-5">

  <div class="row g-4 justify-content-center">

    <!-- SOBRE MIM -->
    <div class="col-md-5">
      <div class="card-custom p-4 text-center h-100">

        <img src="../img/eu.jpeg" class="rounded-circle mb-3" width="110">

        <h4 class="text-info fw-bold">Taynna</h4>
        <p class="text-secondary">Criadora do CineTop </p>

        <p>
          Sou apaixonada por filmes e séries. Criei o CineTop para compartilhar
          rankings, opiniões e recomendações.
        </p>

        <div class="mt-3">
          <span class="badge bg-info text-dark m-1">HTML</span>
          <span class="badge bg-info text-dark m-1">CSS</span>
          <span class="badge bg-info text-dark m-1">Bootstrap</span>
        </div>

      </div>
    </div>

    <!-- CONTATO -->
    <div class="col-md-6">
      <div class="card-custom p-4 h-100">

        <h4 class="text-center text-info fw-bold mb-4">
          Entre em Contato 
        </h4>

        <form>

          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea class="form-control" rows="4"></textarea>
          </div>

          <div class="d-grid">
            <button class="btn btn-custom">Enviar</button>
          </div>

        </form>

      </div>
    </div>

  </div>

</section>

<section class="container py-5">

  <h2 class="text-center text-info fw-bold mb-4">
    Nossa Localização
  </h2>

  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="map-container shadow rounded-4 overflow-hidden">
        <iframe 
          src="https://www.google.com/maps?q=Brasilia&output=embed"
          width="100%" 
          height="400" 
          style="border:0;" 
          loading="lazy">
        </iframe>
      </div>

    </div>
  </div>

</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
